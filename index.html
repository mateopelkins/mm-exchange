// ================= GROUP 5: DYNAMICS OVER TIME (oracle only) =================
// forecasts for a market in arrival order, each with the consensus visible just before it
function marketArrivals(m) {
  const seq = forecastsTimedFor(m.id); // sorted by time, one per person, valid timestamps only
  let sum = 0; const out = [];
  seq.forEach((f, i) => { const prior = i > 0 ? sum / i : null; out.push({ name: f.name, p: f.p, t: f.t, rank: i, n: seq.length, prior }); sum += f.p; });
  return { seq: out, finalC: seq.length ? sum / seq.length : null, n: seq.length };
}
// per-person consensus proximity: avg distance from the consensus visible when they locked
function herdingScores() {
  const players = playersInScope(); const slugs = new Set(players.map(p => p.slug));
  const acc = {};
  analyticsMarkets().forEach(m => {
    marketArrivals(m).seq.forEach(f => {
      if (!slugs.has(f.name) || f.prior === null) return;
      (acc[f.name] = acc[f.name] || { sum: 0, n: 0 }); acc[f.name].sum += Math.abs(f.p - f.prior); acc[f.name].n++;
    });
  });
  return players.map(p => { const a = acc[p.slug]; return a && a.n >= 3 ? { slug: p.slug, name: p.display_name, prox: a.sum / a.n, n: a.n } : null; }).filter(Boolean).sort((a, b) => a.prox - b.prox);
}
// order effect: distance from final consensus vs arrival position (binned)
function orderEffect() {
  const pts = [];
  analyticsMarkets().forEach(m => { const { seq, finalC, n } = marketArrivals(m); if (n < 4 || finalC === null) return; seq.forEach(f => pts.push({ x: f.rank / (n - 1), d: Math.abs(f.p - finalC) })); });
  return pts;
}
function earlyLateBrier() {
  let eSum = 0, eN = 0, lSum = 0, lN = 0;
  resolvedInScope().forEach(m => { const { seq, n } = marketArrivals(m); if (n < 4) return; seq.forEach(f => { const b = brier(f.p, m.outcome); if (f.rank < n / 2) { eSum += b; eN++; } else { lSum += b; lN++; } }); });
  return { early: eN ? eSum / eN : null, late: lN ? lSum / lN : null, eN, lN };
}
// per-market consensus volatility (total movement) and 50%-crossing flips
function consensusDynamics() {
  return analyticsMarkets().map(m => {
    const pts = marketStabilization(m); if (pts.length < 3) return null;
    let move = 0, flips = 0;
    for (let i = 1; i < pts.length; i++) { move += Math.abs(pts[i].mean - pts[i - 1].mean); if ((pts[i - 1].mean - 50) * (pts[i].mean - 50) < 0) flips++; }
    return { m, move, flips, settle: Math.round(pts[pts.length - 1].mean) };
  }).filter(Boolean).sort((a, b) => b.move - a.move);
}
// bellwethers: early forecasts that land close to where the crowd finally settled
function bellwethers() {
  const players = playersInScope(); const slugs = new Set(players.map(p => p.slug));
  const acc = {};
  analyticsMarkets().forEach(m => {
    const { seq, finalC, n } = marketArrivals(m); if (n < 5 || finalC === null) return;
    const earlyCut = Math.ceil(n / 3);
    seq.forEach(f => { if (!slugs.has(f.name) || f.rank >= earlyCut) return; (acc[f.name] = acc[f.name] || { sum: 0, n: 0 }); acc[f.name].sum += Math.abs(f.p - finalC); acc[f.name].n++; });
  });
  return players.map(p => { const a = acc[p.slug]; return a && a.n >= 2 ? { slug: p.slug, name: p.display_name, gap: a.sum / a.n, n: a.n } : null; }).filter(Boolean).sort((a, b) => a.gap - b.gap);
}

function svgOrderEffect() {
  const pts = orderEffect();
  if (pts.length < 8) return null;
  const NB = 5; const bins = Array.from({ length: NB }, () => ({ s: 0, n: 0 }));
  pts.forEach(p => { let i = Math.floor(p.x * NB); if (i >= NB) i = NB - 1; bins[i].s += p.d; bins[i].n++; });
  const avg = bins.map(b => b.n ? b.s / b.n : null);
  // slope of d on x (least squares)
  const mx = pts.reduce((a, p) => a + p.x, 0) / pts.length, my = pts.reduce((a, p) => a + p.d, 0) / pts.length;
  let sxy = 0, sxx = 0; pts.forEach(p => { sxy += (p.x - mx) * (p.d - my); sxx += (p.x - mx) * (p.x - mx); });
  const slope = sxx ? sxy / sxx : 0;
  const W = 520, H = 180, padL = 36, padB = 30, padT = 12, padR = 12;
  const max = Math.max(...avg.filter(v => v !== null), 1);
  const bw = (W - padL - padR) / NB;
  const Y = v => padT + (1 - v / max) * (H - padT - padB);
  let bars = "";
  avg.forEach((v, i) => { if (v === null) return; const x = padL + i * bw; bars += `<rect x="${(x + 4).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${(bw - 8).toFixed(1)}" height="${(H - padB - Y(v)).toFixed(1)}" rx="2" fill="var(--accent)" fill-opacity="0.6"></rect><text x="${(x + bw / 2).toFixed(1)}" y="${(Y(v) - 4).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--faint)">${v.toFixed(0)}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" xmlns="http://www.w3.org/2000/svg">
    ${bars}
    <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--line)"></line>
    <text x="${padL}" y="${H - padB + 16}" font-family="var(--mono)" font-size="9" fill="var(--faint)">first to forecast</text>
    <text x="${W - padR}" y="${H - padB + 16}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="var(--faint)">last</text>
    <text transform="translate(12 ${(H - padB + padT) / 2}) rotate(-90)" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--muted)">avg distance from final consensus</text>
  </svg>`;
}

// ================= GROUP 6: THE QUESTION-WRITER'S MIRROR (oracle only) =================
function questionBalance() {
  const r = resolvedInScope(); if (!r.length) return null;
  const yes = r.filter(m => m.outcome === "YES").length;
  let cs = 0, cn = 0; r.forEach(m => { const a = crowdAvg(m.id); if (a !== null) { cs += a; cn++; } });
  return { n: r.length, yes, yesRate: yes / r.length, crowdMean: cn ? cs / cn : null };
}
function marketDifficulty() {
  return resolvedInScope().map(m => {
    const ps = Object.values(forecastsFor(m.id)); if (!ps.length) return null;
    return { m, avgB: ps.reduce((s, p) => s + brier(p, m.outcome), 0) / ps.length, consensus: crowdAvg(m.id), n: ps.length };
  }).filter(Boolean);
}
function disagreementVsError() {
  const pts = [];
  resolvedInScope().forEach(m => {
    const ps = Object.values(forecastsFor(m.id)); if (ps.length < 2) return;
    const mean = ps.reduce((a, b) => a + b, 0) / ps.length;
    const sd = Math.sqrt(ps.reduce((a, p) => a + (p - mean) * (p - mean), 0) / ps.length);
    pts.push({ m, sd, crowdB: brier(Math.round(mean), m.outcome) });
  });
  if (pts.length < 3) return { pts, r: null };
  const xs = pts.map(p => p.sd), ys = pts.map(p => p.crowdB);
  const mx = xs.reduce((a, b) => a + b, 0) / xs.length, my = ys.reduce((a, b) => a + b, 0) / ys.length;
  let sxy = 0, sxx = 0, syy = 0; for (let i = 0; i < xs.length; i++) { const dx = xs[i] - mx, dy = ys[i] - my; sxy += dx * dy; sxx += dx * dx; syy += dy * dy; }
  return { pts, r: (sxx > 0 && syy > 0) ? sxy / Math.sqrt(sxx * syy) : null };
}
// regularized Rasch: P(correct_ij) = logistic(ability_i - difficulty_j), joint gradient ascent
function raschModel() {
  const markets = resolvedInScope(), players = playersInScope();
  const slugs = players.map(p => p.slug);
  if (markets.length < 4 || slugs.length < 4) return null;
  const nI = slugs.length, nJ = markets.length;
  const Y = [], mask = [];
  slugs.forEach((s, i) => { Y[i] = []; mask[i] = []; markets.forEach((m, j) => { const fs = forecastsFor(m.id); if (s in fs) { Y[i][j] = ((m.outcome === "YES" && fs[s] >= 50) || (m.outcome === "NO" && fs[s] < 50)) ? 1 : 0; mask[i][j] = 1; } else { Y[i][j] = 0; mask[i][j] = 0; } }); });
  let a = new Array(nI).fill(0), d = new Array(nJ).fill(0);
  const lambda = 0.05, lr = 0.05;
  for (let it = 0; it < 400; it++) {
    const ga = new Array(nI).fill(0), gd = new Array(nJ).fill(0);
    for (let i = 0; i < nI; i++) for (let j = 0; j < nJ; j++) {
      if (!mask[i][j]) continue;
      const p = 1 / (1 + Math.exp(-(a[i] - d[j])));
      const r = Y[i][j] - p; ga[i] += r; gd[j] -= r;
    }
    for (let i = 0; i < nI; i++) a[i] += lr * (ga[i] - lambda * a[i]);
    for (let j = 0; j < nJ; j++) d[j] += lr * (gd[j] - lambda * d[j]);
    const md = d.reduce((s, v) => s + v, 0) / nJ; for (let j = 0; j < nJ; j++) d[j] -= md;
  }
  return {
    ability: slugs.map((s, i) => ({ slug: s, name: (players.find(p => p.slug === s) || {}).display_name || s, a: a[i] })).sort((x, y) => y.a - x.a),
    difficulty: markets.map((m, j) => ({ m, d: d[j] })).sort((x, y) => y.d - x.d)
  };
}
function svgDisagErr() {
  const { pts, r } = disagreementVsError();
  if (pts.length < 3) return null;
  const W = 520, H = 220, padL = 46, padB = 40, padT = 14, padR = 14;
  const xMax = Math.max(...pts.map(p => p.sd), 1) * 1.1, yMax = Math.max(...pts.map(p => p.crowdB), 0.1) * 1.1;
  const X = v => padL + (v / xMax) * (W - padL - padR);
  const Y = v => padT + (1 - v / yMax) * (H - padT - padB);
  let dots = "";
  pts.forEach(p => { dots += `<circle cx="${X(p.sd).toFixed(1)}" cy="${Y(p.crowdB).toFixed(1)}" r="4" fill="var(--accent)" fill-opacity="0.7"><title>${esc(symbol(p.m))}</title></circle>`; });
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}" stroke="var(--line)"></line>
    <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--line)"></line>
    ${dots}
    <text x="${W - padR}" y="${H - padB + 16}" text-anchor="end" font-family="var(--mono)" font-size="9" fill="var(--faint)">disagreement (sd of forecasts) &rarr;</text>
    <text transform="translate(14 ${(H - padB + padT) / 2}) rotate(-90)" text-anchor="middle" font-family="var(--mono)" font-size="9" fill="var(--muted)">crowd error (brier)</text>
  </svg>`;
}

// ---------- the analytics screen ----------
function renderAnalytics() {
  const seasons = (DATA.seasons||[]).slice();
  // scope selector: each season (current first) + all-time
  const ordered = seasons.sort((a,b)=> (a.status==="current"?-1:b.status==="current"?1:0));
  const tabs = ordered.map(s => `<button class="scope-tab${analyticsScope===s.season_id?" on":""}" onclick="setAnalyticsScope('${s.season_id}')">${esc(s.label)}</button>`).join("")
    + `<button class="scope-tab${analyticsScope==="all"?" on":""}" onclick="setAnalyticsScope('all')">All-time</button>`;

  const resolved = resolvedInScope();
  const markets = analyticsMarkets();
  const players = playersInScope();
  const calAll = calibrationRows(null);
  const lb = leaderboard(markets);

  let body = "";

  // Awards
  body += `<h2 class="section">Awards</h2>`;
  if (lb.awards && lb.awards.length) {
    body += `<div class="card"><div class="awards-grid">` + lb.awards.map(a =>
      `<div class="award-card" onclick="jumpToPlayer('${a.slug}')">
        <div class="aw-title">${esc(a.label)}</div>
        <div class="aw-winner">${esc(displayName(a.slug))}</div>
        <div class="aw-blurb">${esc(a.blurb)}</div>
      </div>`).join("") + `</div></div>`;
  } else {
    body += `<div class="card"><div class="notice">Awards appear once markets have resolved.</div></div>`;
  }

  // Standings over time
  body += `<h2 class="section">Standings over time</h2>`;
  const lc = leadChanges();
  body += `<div class="card chart-card">${svgStandings()}<div class="chart-note">Each line is a player's running average Brier as markets resolved (lower = better). ${lc>0?`The lead changed hands <b>${lc}</b> time${lc===1?"":"s"} (dashed markers).`:"The leader never changed once it was decided."}</div></div>`;

  // Calibration (pooled)
  body += `<h2 class="section">Calibration &middot; all players</h2>`;
  body += `<div class="card chart-card">${calAll.length?svgCalibration(calAll):`<div class="notice">No resolved markets in this scope yet.</div>`}<div class="chart-note">Dots on the dashed line are perfectly calibrated. Above the line = events happened more than predicted; below = less. Dot size = number of forecasts.</div></div>`;

  // Players (inline panel that swaps in place, no modal)
  body += `<h2 class="section">Players</h2>`;
  const sel = selectedPlayerSlug();
  body += `<div class="card"><div class="player-chips" id="player-buttons">${playerButtonsHtml()}</div>`
    + `<div id="player-panel" class="player-panel">${playerPanelHtml(sel)}</div></div>`;

  // Forecaster camps (correlation of forecasts — no outcomes needed, shows before resolution)
  if (playersInScope().length >= 3) {
    body += `<h2 class="section">Forecaster camps</h2>`;
    body += `<div class="card chart-card"><div class="player-chips" id="camp-buttons">${campButtonsHtml()}</div>`
      + `<div id="camp-panel" class="player-panel">${campPanelHtml()}</div>`
      + `<div class="chart-note">Built from the forecasts themselves, so it appears before any market resolves. Pick a name to see that person's correlation with everyone, or <b>All</b> for the full map with detected groupings. Hover any cell for the pair and their exact correlation.</div></div>`;
    const cp = corrPairs();
    if (cp.closest.length) {
      const prow = o => `<div class="call-row" onclick="selectCampPerson('${o.a}')"><span class="call-who">${esc(displayName(o.a))} &harr; ${esc(displayName(o.b))}</span><span class="call-meta">${o.r.toFixed(2)}</span></div>`;
      body += `<div class="card two-col">
        <div><div class="col-h">most alike &middot; move together</div>${cp.closest.map(prow).join("")}</div>
        <div><div class="col-h">most opposite &middot; move against</div>${cp.furthest.map(prow).join("")}</div>
      </div>`;
    }
  }

  // Forecaster quality across everyone (Group 1 population layer)
  const qual = allPlayerQuality();
  if (qual.length >= 2) {
    body += `<h2 class="section">The skill plane</h2>`;
    body += `<div class="card chart-card">${svgSkillPlane()}<div class="chart-note">Every player by how well calibrated they are (vertical, higher is better) and how much their forecasts discriminate YES from NO outcomes (horizontal, right is better). Top-right is the sweet spot: sharp and calibrated. Click a dot. Noisy at one season's sample size.</div></div>`;

    const byRes = qual.slice().sort((a, b) => b.d.res - a.d.res);
    const byRel = qual.slice().sort((a, b) => a.d.rel - b.d.rel);
    const qRow = (o, val) => `<div class="call-row" onclick="jumpToPlayer('${o.slug}')"><span class="call-who">${esc(o.name)}</span><span class="call-meta">${val}</span></div>`;
    body += `<h2 class="section">Calibration &amp; discrimination</h2>`;
    body += `<div class="card two-col">
      <div><div class="col-h">most discriminating &middot; resolution</div>${byRes.map(o => qRow(o, o.d.res.toFixed(3))).join("")}</div>
      <div><div class="col-h">best calibrated &middot; reliability</div>${byRel.map(o => qRow(o, o.d.rel.toFixed(3))).join("")}</div>
    </div>`;

    const slopeVals = qual.filter(o => o.slope !== null && isFinite(o.slope)).map(o => Math.max(0, Math.min(3, o.slope)));
    if (slopeVals.length >= 3) {
      const med = slopeVals.slice().sort((a, b) => a - b)[Math.floor(slopeVals.length / 2)];
      const verdict = med < 0.9 ? "the group skews <b>overconfident</b> &mdash; forecasts run too extreme for how often they come true"
        : med > 1.1 ? "the group skews <b>underconfident</b> &mdash; forecasts hug the middle more than the outcomes justify"
        : "the group is <b>reasonably well-scaled</b> overall";
      body += `<h2 class="section">Is the group over- or under-confident?</h2>`;
      body += `<div class="card chart-card">${svgSlopeDist()}<div class="chart-note">Median calibration slope ${med.toFixed(2)}: ${verdict}. Each player's slope is noisy, but the distribution across ${slopeVals.length} players is informative.</div></div>`;
    }
  }

  // Population & typology (Group 4)
  const pop = populationStats();
  if (pop.filter(o => o.brier !== null).length >= 3) {
    body += `<h2 class="section">How the group spreads</h2>`;
    body += `<div class="card two-col">
      <div><div class="col-h">skill &middot; average brier</div>${svgHist(pop.map(o => o.brier), { label: "lower = better" })}</div>
      <div><div class="col-h">boldness &middot; distance from 50%</div>${svgHist(pop.map(o => o.boldness), { label: "higher = bolder", fmt: v => v.toFixed(0) })}</div>
    </div>`;
    body += `<h2 class="section">Bold vs accurate</h2>`;
    body += `<div class="card chart-card">${svgBoldAccurate()}<div class="chart-note">Does conviction pay off? Each player by how bold they are (right) and how accurate (up). Top-right is bold and right; bottom-right is bold and wrong. Click a dot.</div></div>`;
  }

  // Luck vs skill (Group 2): bootstrap CIs + pairwise superiority
  const boot = bootstrapBrier(2000);
  if (boot) {
    body += `<h2 class="section">How much is luck?</h2>`;
    body += `<div class="card chart-card">${svgBrierCI(boot)}<div class="chart-note">Each player's average Brier (purple dot) with a 90% confidence interval from resampling the ${boot.M} resolved markets ${boot.B.toLocaleString()} times. Where bars overlap heavily, the ranking between those players is essentially a coin flip given this season's sample.</div></div>`;
    body += `<h2 class="section">Who really beats whom</h2>`;
    body += `<div class="card chart-card">${htmlPairwise(boot)}<div class="chart-note">Each cell is the probability the row player's true skill is better (lower Brier) than the column player's, estimated from the same resampling. Deep green means a reliable edge; pale cells near 50 are toss-ups. Players are ordered best-to-worst by observed Brier.</div></div>`;
  } else if (resolvedInScope().length && playersInScope().length >= 2) {
    body += `<h2 class="section">How much is luck?</h2><div class="card"><div class="notice">Confidence intervals need at least about five resolved markets to be meaningful.</div></div>`;
  }

  // Confidence distribution (pooled)
  body += `<h2 class="section">Confidence distribution &middot; all players</h2>`;
  const allProbs = [];
  analyticsMarkets().forEach(m => { const fs = forecastsFor(m.id); for (const slug in fs) { const pr = D().people.find(x=>x.slug===slug); if (pr && (pr.role||"player")==="player") allProbs.push(fs[slug]); } });
  body += `<div class="card chart-card">${svgConfidence(allProbs)}<div class="chart-note">How often forecasts land near the middle (uncertain) versus near the extremes (confident), across everyone.</div></div>`;

  // Guessing distribution (when forecasts were placed)
  body += `<h2 class="section">When guesses happen</h2>`;
  body += `<div class="card chart-card">${svgGuessTiming()}<div class="chart-note">The distribution of when forecasts were locked across the season &mdash; the shape of the crowd's guessing habits.</div></div>`;

  // Consensus stabilization (one market at a time, selectable)
  body += `<h2 class="section">How consensus settles</h2>`;
  const stabList = stabMarketsList();
  if (stabList.length) {
    const ssel = selectedStabMarketId();
    body += `<div class="card chart-card"><div class="player-chips" id="stab-buttons">${stabButtonsHtml()}</div>`
      + `<div id="stab-panel" class="player-panel">${ssel === "all" ? svgStabilizationAll() : svgStabilization(marketById(ssel))}</div>`
      + `<div class="chart-note">Each market's running consensus as forecasts arrived. Pick a market for the detailed view with individual forecasts, or <b>All</b> to overlay every market's line (left = first forecast, right = last). Markets whose forecasts came in over a longer span are listed first.</div></div>`;
  } else {
    body += `<div class="card"><div class="notice">Consensus movement appears once markets have several forecasts placed at different times.</div></div>`;
  }

  // Dynamics over time (Group 5)
  const herd = herdingScores();
  if (herd.length >= 4) {
    body += `<h2 class="section">Who herds, who goes their own way</h2>`;
    const hRow = o => `<div class="call-row" onclick="jumpToPlayer('${o.slug}')"><span class="call-who">${esc(o.name)}</span><span class="call-meta">${o.prox.toFixed(0)} pts</span></div>`;
    const independents = herd.slice().reverse().slice(0, 6);
    const followers = herd.slice(0, 6);
    body += `<div class="card two-col">
      <div><div class="col-h">most independent &middot; far from the room</div>${independents.map(hRow).join("")}</div>
      <div><div class="col-h">most consensus-following &middot; close to the room</div>${followers.map(hRow).join("")}</div>
    </div><div class="card" style="margin-top:0;border:none;padding-top:0;background:none"><div class="chart-note">Average distance between a player's forecast and the consensus already visible when they locked. Low = they land near the prevailing view; high = they diverge. A footprint of anchoring, though it can't fully separate genuine agreement from being pulled.</div></div>`;
  }
  const oe = svgOrderEffect();
  if (oe) {
    const el = earlyLateBrier();
    let elNote = "";
    if (el.early !== null && el.late !== null) {
      const who = el.late < el.early ? "later forecasts scored better (Brier " + el.late.toFixed(3) + " vs " + el.early.toFixed(3) + ")" : el.early < el.late ? "earlier forecasts scored better (Brier " + el.early.toFixed(3) + " vs " + el.late.toFixed(3) + ")" : "early and late forecasts scored about the same";
      elNote = ` On resolved markets, ${who}.`;
    }
    body += `<h2 class="section">Do later forecasters herd?</h2>`;
    body += `<div class="card chart-card">${oe}<div class="chart-note">If the bars shrink left-to-right, forecasters who arrive later land closer to where the consensus ends up &mdash; the signature of herding toward the running average.${elNote}</div></div>`;
  }
  const cd = consensusDynamics();
  if (cd.length) {
    const maxMove = Math.max(...cd.map(o => o.move), 1);
    body += `<h2 class="section">Which markets swung the most</h2>`;
    body += `<div class="card"><div class="disag-list">` + cd.slice(0, 12).map(o => {
      const w = Math.round(o.move / maxMove * 100);
      return `<div class="disag-row"><div class="disag-label">${esc(symbol(o.m))}</div><div class="disag-track"><div class="disag-fill" style="width:${w}%"></div></div><div class="disag-val">${o.move.toFixed(0)}</div><div class="disag-flip">${o.flips ? o.flips + " flip" + (o.flips === 1 ? "" : "s") : ""}</div></div>`;
    }).join("") + `</div><div class="chart-note">Total movement of the running consensus before it settled (higher = the crowd changed its mind more). A "flip" is a time the consensus crossed the 50% line between YES and NO.</div></div>`;
  }
  const bw = bellwethers();
  if (bw.length >= 3) {
    body += `<h2 class="section">Bellwethers</h2>`;
    body += `<div class="card">` + bw.slice(0, 6).map(o => `<div class="call-row" onclick="jumpToPlayer('${o.slug}')"><span class="call-who">${esc(o.name)}</span><span class="call-meta">${o.gap.toFixed(0)} pts from final</span></div>`).join("")
      + `<div class="chart-note">Players whose early forecasts (first third to arrive) landed closest to where the crowd finally settled &mdash; the crowd tended to converge to where they already were. Suggestive of a good early read, not proof of influence.</div></div>`;
  }

  // Disagreement
  body += `<h2 class="section">Most divisive markets</h2>`;
  body += `<div class="card chart-card">${svgDisagreement()}<div class="chart-note">Spread (standard deviation) of forecasts. Higher = the group disagreed more.</div></div>`;

  // Head to head
  body += `<h2 class="section">Head to head</h2>`;
  body += `<div class="card chart-card">${svgHeadToHead()}<div class="chart-note">On markets two players both forecast, who had the lower Brier more often. Read across a row: wins&ndash;losses versus each column. Green = that row leads the matchup.</div></div>`;

  // Hot takes
  body += `<h2 class="section">Hot takes</h2>`;
  const ht = hotTakes(12);
  if (ht.length) {
    body += `<div class="card"><div class="take-list">` + ht.map(t => {
      const tag = t.resolved ? (t.correct ? `<span class="take-hit">nailed it</span>` : `<span class="take-miss">whiffed</span>`) : `<span class="take-pending">pending</span>`;
      return `<div class="take-row" onclick="jumpToPlayer('${t.slug}')">
        <span class="take-pct">${t.p}%</span>
        <span class="take-body"><b>${esc(displayName(t.slug))}</b> on ${esc(symbol(t.m))}</span>
        ${tag}
      </div>`;
    }).join("") + `</div><div class="chart-note">The boldest forecasts of the season (furthest from 50%), and whether they paid off.</div></div>`;
  } else {
    body += `<div class="card"><div class="notice">No forecasts in this scope yet.</div></div>`;
  }

  // Best & worst single calls
  body += `<h2 class="section">Best calls &amp; biggest blunders</h2>`;
  const sc = singleCalls();
  if (sc.best.length) {
    body += `<div class="card chart-card"><div class="player-chips" id="calls-buttons">${callButtonsHtml()}</div>`
      + `<div id="calls-panel">${callsPanelHtml()}</div>`
      + `<div class="chart-note" id="calls-note">${callsNote()}</div></div>`;
  } else {
    body += `<div class="card"><div class="notice">Appears once markets have resolved.</div></div>`;
  }

  // Crowd vs reality
  body += `<h2 class="section">The crowd vs reality</h2>`;
  const cs = crowdScore();
  if (cs.total) {
    body += `<div class="card"><div class="crowd-head">The crowd consensus called <b>${cs.correct}</b> of <b>${cs.total}</b> markets right${cs.rate!==null?` <span class="muted2">(${Math.round(cs.rate*100)}%)</span>`:""}.</div>`;
    if (cs.wrong.length) {
      body += `<div class="col-h" style="margin-top:12px">Where the crowd was most wrong</div>` + cs.wrong.map(w =>
        `<div class="call-row"><span class="call-who">${esc(symbol(w.m))}</span><span class="call-meta">crowd ${w.avg}% &middot; actually <span class="${w.m.outcome==="YES"?"y":"n"}">${w.m.outcome}</span></span></div>`
      ).join("");
    } else {
      body += `<div class="chart-note">The crowd got every resolved market right. Spooky.</div>`;
    }
    body += `</div>`;
  } else {
    body += `<div class="card"><div class="notice">Appears once markets have resolved.</div></div>`;
  }

  // Collective intelligence (Group 3)
  const cmp = crowdComparison();
  if (cmp) {
    body += `<h2 class="section">Is the crowd wise?</h2>`;
    const verdict = cmp.crowdBrier < cmp.avgIndivBrier
      ? `The crowd consensus (Brier ${cmp.crowdBrier.toFixed(3)}) beats the average individual (${cmp.avgIndivBrier.toFixed(3)})`
      : `The crowd consensus (Brier ${cmp.crowdBrier.toFixed(3)}) is not beating the average individual (${cmp.avgIndivBrier.toFixed(3)})`;
    body += `<div class="card chart-card"><div class="crowd-head" style="font-size:18px">${verdict}.</div>`
      + `<p style="font-size:13px;color:var(--muted);margin:6px 0 4px">${cmp.beatCrowd} of ${cmp.nPlayers} individual${cmp.nPlayers === 1 ? "" : "s"} beat the crowd outright. The diversity-prediction theorem makes the gap exact: the more your forecasters disagree, the more their individual errors cancel.</p>`
      + svgDiversityBar(cmp)
      + `<div class="chart-note">Crowd error + diversity = average individual error (${cmp.crowdBrier.toFixed(3)} + ${cmp.diversity.toFixed(3)} = ${(cmp.crowdBrier + cmp.diversity).toFixed(3)}).</div></div>`;

    const loo = leaveOneOut();
    if (loo && loo.res.length >= 3) {
      const helpers = loo.res.filter(o => o.help > 0).slice(0, 6);
      const draggers = loo.res.filter(o => o.help < 0).slice(-6).reverse();
      const looRow = o => `<div class="call-row" onclick="jumpToPlayer('${o.slug}')"><span class="call-who">${esc(o.name)}</span><span class="call-meta">${o.help >= 0 ? "+" : "&minus;"}${(Math.abs(o.help) * 1000).toFixed(1)}</span></div>`;
      body += `<h2 class="section">Who makes the crowd smarter?</h2>`;
      body += `<div class="card two-col">
        <div><div class="col-h">lifts the crowd &middot; removing them hurts</div>${helpers.length ? helpers.map(looRow).join("") : `<div class="muted2" style="font-size:13px">No clear lifters.</div>`}</div>
        <div><div class="col-h">drags the crowd &middot; removing them helps</div>${draggers.length ? draggers.map(looRow).join("") : `<div class="muted2" style="font-size:13px">No clear draggers.</div>`}</div>
      </div><div class="card" style="margin-top:0;border:none;padding-top:0;background:none"><div class="chart-note">Change in the crowd's Brier (&times;1000) when each person is removed. Positive = the crowd got worse without them, so they were helping. At ${cmp.nPlayers} forecasters one person barely moves the average, so magnitudes are small, but the sign and ordering are meaningful.</div></div>`;
    }

    const sat = saturationCurve();
    if (sat) {
      body += `<h2 class="section">How many forecasters do you need?</h2>`;
      body += `<div class="card chart-card">${svgSaturation(sat)}<div class="chart-note">Average Brier of a consensus built from a random k of your forecasters, for each k. The curve shows how fast accuracy saturates: most of the wisdom-of-crowds benefit usually arrives within the first several people, with diminishing returns after.</div></div>`;
    }
  }

  // The question-writer's mirror (Group 6)
  const qb = questionBalance();
  if (qb) {
    body += `<h2 class="section">The questions themselves</h2>`;
    const lean = qb.yesRate > 0.6 ? "tilted toward YES" : qb.yesRate < 0.4 ? "tilted toward NO" : "fairly balanced";
    const crowdLine = qb.crowdMean !== null ? ` The crowd's average forecast was ${qb.crowdMean.toFixed(0)}%, against a ${(qb.yesRate * 100).toFixed(0)}% YES base rate.` : "";
    body += `<div class="card"><div class="crowd-head" style="font-size:18px">${qb.yes} of ${qb.n} resolved markets came true (${(qb.yesRate * 100).toFixed(0)}% YES) &mdash; the set is ${lean}.</div><div class="chart-note">${crowdLine} A heavy tilt means the questions, or Mateo, are more predictable in one direction than a coin flip.</div></div>`;

    const md = marketDifficulty();
    if (md.length >= 2) {
      const byHard = md.slice().sort((a, b) => b.avgB - a.avgB);
      const mdRow = o => `<div class="call-row"><span class="call-who">${esc(symbol(o.m))}${o.consensus !== null ? ` <span class="muted2">crowd ${o.consensus}%</span>` : ""}</span><span class="call-meta">${o.avgB.toFixed(2)} &middot; <span class="${o.m.outcome === "YES" ? "y" : "n"}">${o.m.outcome}</span></span></div>`;
      body += `<h2 class="section">Hardest and easiest to call</h2>`;
      body += `<div class="card two-col">
        <div><div class="col-h">hardest &middot; highest average error</div>${byHard.slice(0, 5).map(mdRow).join("")}</div>
        <div><div class="col-h">easiest &middot; lowest average error</div>${byHard.slice().reverse().slice(0, 5).map(mdRow).join("")}</div>
      </div><div class="card" style="margin-top:0;border:none;padding-top:0;background:none"><div class="chart-note">Average Brier across all forecasters on each market. Hard means everyone struggled (unlike "divisive," where the room split). A market can be unanimous yet hard if the crowd was confidently wrong.</div></div>`;
    }

    const de = svgDisagErr(), der = disagreementVsError();
    if (de) {
      const rNote = der.r === null ? "" : der.r > 0.25 ? `Positive (r = ${der.r.toFixed(2)}): when the room splits, the crowd does tend to be more wrong.` : der.r < -0.25 ? `Negative (r = ${der.r.toFixed(2)}): disagreement actually coincides with a better crowd call here.` : `Near zero (r = ${der.r.toFixed(2)}): disagreement and crowd error look roughly unrelated.`;
      body += `<h2 class="section">Does disagreement predict error?</h2>`;
      body += `<div class="card chart-card">${de}<div class="chart-note">Each dot is a resolved market: how much forecasters disagreed (across) versus how wrong the consensus was (up). ${rNote}</div></div>`;
    }

    const rasch = raschModel();
    if (rasch) {
      const aRow = o => `<div class="call-row" onclick="jumpToPlayer('${o.slug}')"><span class="call-who">${esc(o.name)}</span><span class="call-meta">${o.a >= 0 ? "+" : ""}${o.a.toFixed(2)}</span></div>`;
      const dRow = o => `<div class="call-row"><span class="call-who">${esc(symbol(o.m))}</span><span class="call-meta">${o.d >= 0 ? "+" : ""}${o.d.toFixed(2)}</span></div>`;
      body += `<h2 class="section">Difficulty &amp; ability model <span class="muted2" style="font-size:12px;text-transform:none;letter-spacing:0">&mdash; experimental</span></h2>`;
      body += `<div class="card two-col">
        <div><div class="col-h">forecaster ability</div>${rasch.ability.slice(0, 8).map(aRow).join("")}</div>
        <div><div class="col-h">market difficulty</div>${rasch.difficulty.slice(0, 8).map(dRow).join("")}</div>
      </div><div class="card" style="margin-top:0;border:none;padding-top:0;background:none"><div class="chart-note">An item-response (Rasch) model fit jointly: each person's ability and each market's difficulty on one scale, from who got which side right. Unlike raw accuracy, it discounts being right on easy markets and rewards being right where stronger forecasters failed. Estimable now that there are 25 of you, but still noisy on one season &mdash; read it as suggestive.</div></div>`;
    }
  }

  // Per-question detail (All = stacked, or one market)
  body += `<h2 class="section">Every market &middot; every forecast</h2>`;
  if (markets.length) {
    body += `<div class="card chart-card"><div class="player-chips" id="dot-buttons">${dotButtonsHtml()}</div>`
      + `<div id="dot-panel" class="player-panel">${dotPanelHtml()}</div>`
      + `<div class="chart-note">Each dot is one person's forecast (click to open them). Green = correct side, red = wrong side once resolved. Dashed line = crowd consensus. <b>All</b> stacks every market; pick one to focus.</div></div>`;
  } else {
    body += `<div class="card"><div class="notice">No markets in this scope.</div></div>`;
  }

  const who = `<div class="whoami">analytics &middot; the Oracle <span class="linkish" onclick="closeAnalytics()">&larr; back to exchange</span></div>`;
  $app.innerHTML = who
    + `<div class="scope-bar">${tabs}</div>`
    + body;
  document.getElementById("modal-root").innerHTML = "";
}

// ================= PLAYER PROFILE (clickable from leaderboard) =================
// Cross-season profile. Trophies come from COMPLETED (archived) seasons only, so an
// award belongs to whoever held it at season's end, not transiently mid-season.
// Guess history shows resolved markets only (public via resolved cards), so opening
// another player's profile never leaks anyone's pending forecast.

function profileTrophies(slug) {
  const out = [];
  (D().seasons||[]).filter(s => s.status !== "current").forEach(s => {
    const lb = leaderboard(seasonMarkets(s.season_id));
    const won = (lb.byPerson && lb.byPerson[slug]) || [];
    won.forEach(k => out.push({ key: k, label: AWARD_LABEL[k], season: s.label }));
  });
  return out;
}
function personSeasonResolved(slug, seasonId) {
  return seasonMarkets(seasonId)
    .filter(m => m.status === "resolved" && m.outcome && (slug in forecastsFor(m.id)))
    .map(m => { const p = forecastsFor(m.id)[slug]; return { m, p, outcome: m.outcome, b: brier(p, m.outcome) }; });
}
function personAllResolvedRows(slug) {
  const rows = [];
  (D().markets||[]).forEach(m => {
    if (isVoid(m) || m.status !== "resolved" || !m.outcome) return;
    const fs = forecastsFor(m.id);
    if (slug in fs) rows.push({ p: fs[slug], outcome: m.outcome });
  });
  return rows;
}

function profileModalHtml(slug) {
  const life = personStats(slug, allLiveMarkets());
  const allRec = personAllResolvedRows(slug);
  const boldnessRows = [];
  (D().markets||[]).forEach(m => { if (isVoid(m)) return; const fs = forecastsFor(m.id); if (slug in fs) boldnessRows.push(fs[slug]); });
  const boldness = boldnessRows.length ? boldnessRows.reduce((a,p)=>a+Math.abs(p-50),0)/boldnessRows.length : null;

  // trophies (completed seasons)
  const trophies = profileTrophies(slug);
  const trophyHtml = trophies.length
    ? `<div class="award-list">` + trophies.map(t => `<span class="award-pill">${esc(t.label)} <span class="aw-season">| ${esc(t.season)}</span></span>`).join("") + `</div>`
    : `<p class="muted2" style="font-size:13px;margin:6px 0 0">No trophies yet. Awards are granted when a season ends.</p>`;

  // per-season resolved guess history (current first, then archived), newest seasons on top
  const seasons = (D().seasons||[]).slice().sort((a,b)=> (a.status==="current"?-1:b.status==="current"?1:0));
  let seasonsHtml = "";
  seasons.forEach(s => {
    const rec = personSeasonResolved(slug, s.season_id);
    if (!rec.length) return;
    const avg = rec.reduce((a,r)=>a+r.b,0)/rec.length;
    const rows = rec.slice().sort((a,b)=>a.b-b.b).map(r =>
      `<tr><td>${esc(symbol(r.m))}</td><td style="text-align:right">${r.p}%</td><td style="text-align:center"><span class="${r.outcome==="YES"?"y":"n"}">${r.outcome}</span></td><td style="text-align:right">${r.b.toFixed(2)}</td></tr>`
    ).join("");
    seasonsHtml += `<div class="ps-season"><div class="ps-head"><span>${esc(s.label)}${s.status==="current"?` <span class="muted2">(in progress)</span>`:""}</span><span class="ps-avg">avg ${avg.toFixed(2)}</span></div>
      <table class="pp-table"><thead><tr><th>market</th><th style="text-align:right">forecast</th><th style="text-align:center">outcome</th><th style="text-align:right">brier</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  });
  if (!seasonsHtml) seasonsHtml = `<div class="notice">No resolved forecasts yet.</div>`;

  return `<div class="modal-bg" onclick="if(event.target===this)closeProfile()">
    <div class="modal" role="dialog" aria-label="Profile">
      <h3>${esc(displayName(slug))}</h3>
      <div class="m-sub">lifetime record</div>
      ${(slug === ME && myRole() === "player") ? statusEditorHtml() : ""}
      <div class="pp-stats">
        <div><div class="pp-v">${life.avg!==null?life.avg.toFixed(2):"&mdash;"}</div><div class="pp-l">avg brier</div></div>
        <div><div class="pp-v">${boldness!==null?boldness.toFixed(0):"&mdash;"}</div><div class="pp-l">boldness</div></div>
        <div><div class="pp-v">${life.n}</div><div class="pp-l">resolved</div></div>
        <div><div class="pp-v">${seasonsPlayedBy(slug)}</div><div class="pp-l">seasons</div></div>
      </div>
      <h4>Trophy case</h4>
      ${trophyHtml}
      <h4>Calibration &middot; lifetime</h4>
      ${allRec.length?svgCalibration(allRec):`<div class="notice">No resolved forecasts yet.</div>`}
      <div class="chart-note">Closer to the dashed line = better calibrated. Dot size = number of forecasts in that band.</div>
      <h4>Forecasts by season</h4>
      ${seasonsHtml}
      <button class="modal-close" onclick="closeProfile()">Close</button>
    </div>
  </div>`;
}

function statusEditorHtml() {
  const p = DATA.people.find(x => x.slug === ME);
  const cur = p ? (p.status || "") : "";
  return `<div class="status-editor">
    <div class="pg-label">your status</div>
    <div class="status-row">
      <input type="text" id="status-input" maxlength="60" value="${esc(cur)}" placeholder="a short line shown under your name" oninput="document.getElementById('status-count').textContent=(60-this.value.length)">
      <button class="status-save" onclick="saveStatus()">Save</button>
    </div>
    <div class="status-hint"><span id="status-count">${60 - cur.length}</span> characters left <span id="status-msg"></span></div>
  </div>`;
}

async function saveStatus() {
  const inp = document.getElementById("status-input");
  const msg = document.getElementById("status-msg");
  const btn = document.querySelector(".status-save");
  if (!inp) return;
  const val = inp.value.replace(/\s+/g, " ").trim().slice(0, 60);
  btn.disabled = true; btn.textContent = "Saving\u2026"; if (msg) msg.textContent = "";
  try {
    const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "status", name: ME, status: val }) });
    const out = await res.json();
    if (out.ok) {
      const p = DATA.people.find(x => x.slug === ME); if (p) p.status = (out.status !== undefined ? out.status : val);
      render();              // refresh leaderboard sublines
      openProfile(ME);       // re-open profile with saved value
    } else {
      btn.disabled = false; btn.textContent = "Save"; if (msg) msg.textContent = " &middot; " + (out.error || "could not save");
    }
  } catch (err) {
    btn.disabled = false; btn.textContent = "Save"; if (msg) msg.textContent = " &middot; couldn't reach the exchange";
  }
}

async function init() {
  try { const res = await fetch(API_URL); DATA = await res.json(); }
  catch (err) { $app.innerHTML = `<div class="notice" style="margin-top:20px">Couldn't reach the data service. It may be waking up; refresh in a few seconds.</div>`; return; }
  // Resolve identity against the real people tab (GUEST still false, so D() === DATA here).
  const urlName = new URLSearchParams(location.search).get("name");
  const stored = localStorage.getItem("mm_name");
  const valid = s => s && DATA.people.some(p => p.slug === s);
  if (valid(urlName)) { ME = urlName; localStorage.setItem("mm_name", urlName); }
  else if (valid(stored)) { ME = stored; }
  // If this person is a guest, swap in sealed sample data before anything reads a season.
  if (myRole() === "guest") { GUEST_DATA = buildGuestData(DATA); GUEST = true; }
  const cs = currentSeason();
  viewSeasonId = cs ? cs.season_id : null;
  render();
}

document.addEventListener("keydown", function(e){ if (e.key === "Escape") { closeHelp(); closeLeaderboard(); closeProfile(); } });
(function(){ const v = document.getElementById("ver"); if (v) v.textContent = "v" + VERSION; })();
init();
</script>
