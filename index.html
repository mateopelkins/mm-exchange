<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MateoMarkets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Spline+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1d1f23;
    --card: #25272d;
    --card-hover: #292b32;
    --line: #34363e;
    --line-strong: #45474f;
    --ink: #e9e7e2;
    --muted: #a2a4ab;
    --faint: #6e7077;
    --accent: #9a8cf5;
    --accent-strong: #7263e8;
    --accent-hover: #8577ee;
    --accent-tint: rgba(154, 140, 245, 0.12);
    --yes: #3bbd8d;
    --yes-tint: rgba(59, 189, 141, 0.14);
    --no: #e2754e;
    --no-tint: rgba(226, 117, 78, 0.14);
    --serif: "Instrument Serif", Georgia, serif;
    --sans: "Spline Sans", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  /* archived-season recolor: purple authority becomes aged amber */
  body.archived {
    --accent: #cda23f;
    --accent-strong: #b88a2c;
    --accent-hover: #cda23f;
    --accent-tint: rgba(205, 162, 63, 0.13);
  }
  * { box-sizing: border-box; margin: 0; }
  ::selection { background: var(--accent); color: #16171a; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.55; padding: 32px 16px 60px; }
  .wrap { max-width: 980px; margin: 0 auto; }
  a, .linkish { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  .masthead { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; padding-bottom: 14px; border-bottom: 4px double var(--line-strong); }
  .brand { font-family: var(--serif); font-size: clamp(30px, 8.5vw, 38px); line-height: 1.1; letter-spacing: 0.045em; word-spacing: 0.08em; }
  .tagline { font-family: var(--serif); font-style: italic; color: var(--muted); font-size: 16px; margin-top: 2px; }
  .est { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); text-align: right; line-height: 1.8; }

  .ticker { overflow: hidden; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .ticker-inner { display: inline-block; padding: 7px 0; font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; color: var(--muted); animation: crawl 45s linear infinite; }
  .ticker:hover .ticker-inner { animation-play-state: paused; }
  .ticker .sym { color: var(--ink); font-weight: 500; }
  .ticker .up { color: var(--yes); }
  .ticker .down { color: var(--no); }
  .ticker .pending { color: var(--accent); }
  .ticker .sep { color: var(--faint); margin: 0 14px; }
  @keyframes crawl { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) { .ticker-inner { animation: none; } }

  .topnav { display: flex; justify-content: flex-end; padding: 10px 0 0; }
  .btn-ghost { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 7px 13px; cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .archive-banner { position: sticky; top: 8px; z-index: 5; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; background: #2e2a1d; border: 1px solid rgba(205,162,63,0.45); border-radius: 10px; padding: 11px 15px; margin: 10px 0 20px; }
  .archive-banner b { font-family: var(--serif); font-weight: 400; font-size: 19px; }
  .ab-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #cda23f; border: 1px solid #cda23f; border-radius: 4px; padding: 2px 8px; margin-right: 8px; }

  .whoami { font-size: 13px; color: var(--muted); margin-top: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .whoami b { color: var(--ink); font-weight: 600; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 18px 0 6px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .stat .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
  .stat .value { font-family: var(--mono); font-size: 22px; font-weight: 500; margin-top: 3px; }
  .stat .sub { font-size: 12px; color: var(--faint); }

  h2.section { display: flex; align-items: center; gap: 12px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 34px 0 12px; font-weight: 500; }
  h2.section::after { content: ""; flex: 1; border-top: 1px solid var(--line); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; transition: border-color 0.15s ease, background 0.15s ease; }
  .card:hover { border-color: var(--line-strong); background: var(--card-hover); }
  .card .top { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
  .q { font-family: var(--serif); font-size: 20px; line-height: 1.4; letter-spacing: 0.03em; word-spacing: 0.06em; flex: 1 1 60%; min-width: 220px; overflow-wrap: break-word; }
  .symline { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .chip { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; background: #2c2e35; color: var(--muted); border: 1px solid var(--line); flex: 0 1 auto; max-width: 45%; text-align: right; }
  .chip.yes { background: var(--yes-tint); color: var(--yes); border-color: transparent; }
  .chip.no { background: var(--no-tint); color: var(--no); border-color: transparent; }
  .criteria { color: var(--muted); font-size: 13px; margin-top: 8px; }

  .forecast-row { display: flex; align-items: flex-start; gap: 14px; margin-top: 18px; }
  .forecast-row label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); white-space: nowrap; padding-top: 6px; }
  .slider-wrap { flex: 1; min-width: 0; }
  .slider-ends { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--faint); margin-top: -2px; padding: 0 2px; }

  .help-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease; }
  .help-btn:hover { border-color: var(--accent); color: var(--accent); }
  .modal-bg { position: fixed; inset: 0; background: rgba(10,11,13,0.72); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow-y: auto; }
  .modal { background: var(--card); border: 1px solid var(--line-strong); border-radius: 14px; max-width: 560px; width: 100%; padding: 26px 28px 30px; }
  .modal h3 { font-family: var(--serif); font-size: 26px; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 4px; }
  .modal .m-sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .modal h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin: 20px 0 8px; }
  .modal p { font-size: 14px; color: var(--ink); margin-bottom: 10px; line-height: 1.6; }
  .modal .ex { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--muted); margin: 6px 0; }
  .modal .ex b { color: var(--ink); font-weight: 600; }
  .modal .bonus { border-top: 1px solid var(--line); margin-top: 22px; padding-top: 6px; }
  .modal .formula { font-family: var(--mono); font-size: 13px; color: var(--ink); background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin: 8px 0; }
  .modal-close { display: block; margin: 22px 0 0 auto; font: 500 13px var(--sans); padding: 9px 18px; border-radius: 8px; border: 1px solid var(--accent-strong); background: var(--accent-strong); color: #fff; cursor: pointer; }
  .modal-close:hover { background: var(--accent-hover); }
  input[type=range] { width: 100%; accent-color: var(--accent); height: 20px; }
  .prob { font-family: var(--mono); font-size: 24px; font-weight: 500; min-width: 60px; text-align: right; color: var(--accent); padding-top: 2px; }

  .actions { display: flex; align-items: center; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  button.lock { font: 500 13px var(--sans); padding: 9px 18px; border-radius: 8px; border: 1px solid var(--accent-strong); background: var(--accent-strong); color: #fff; cursor: pointer; transition: background 0.15s ease; }
  button.lock:hover { background: var(--accent-hover); }
  button.lock:disabled { opacity: 0.5; cursor: default; }
  .hint { font-size: 12px; color: var(--faint); }
  .err { font-size: 12px; color: var(--no); }

  .locked-line { margin-top: 16px; font-size: 13px; color: var(--muted); }
  .locked-line .me { font-family: var(--mono); color: var(--accent); font-weight: 500; }
  .bar { position: relative; display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; background: var(--no-tint); }
  .you-tick { position: absolute; top: 0; bottom: 0; width: 2px; background: #f4f1ea; transform: translateX(-1px); z-index: 2; }
  .you-mid { display: inline-flex; align-items: center; gap: 6px; color: var(--ink); font-weight: 500; }
  .you-dot { width: 9px; height: 2px; background: #f4f1ea; box-shadow: 0 0 0 1px rgba(20,21,23,0.45); border-radius: 1px; flex-shrink: 0; }
  .bar .fill { height: 100%; background: var(--yes); }
  .bar-caption { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--mono); letter-spacing: 0.04em; }
  .bar-caption .y { color: var(--yes); }
  .bar-caption .n { color: var(--no); }

  table.results { width: 100%; border-collapse: collapse; margin-top: 14px; font-size: 13px; }
  table.results td, table.results th { padding: 7px 9px; text-align: left; }
  table.results th { font-family: var(--mono); color: var(--faint); font-weight: 400; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--line); }
  table.results td.num, table.results th.num { text-align: right; font-family: var(--mono); }
  tr.me-row td { background: var(--accent-tint); }
  tr.me-row td:first-child { border-radius: 6px 0 0 6px; }
  tr.me-row td:last-child { border-radius: 0 6px 6px 0; }

  .lb-row { display: flex; align-items: center; gap: 9px; padding: 9px 2px; border-bottom: 1px solid var(--line); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family: var(--serif); font-size: 17px; color: var(--faint); min-width: 16px; text-align: center; }
  .lb-row.first .lb-rank { color: var(--accent); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; font-weight: 500; background: var(--accent-tint); color: var(--accent); flex-shrink: 0; }
  .lb-name { font-weight: 600; flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .badge { font-family: var(--mono); font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; padding: 3px 7px; border-radius: 999px; background: #2c2e35; border: 1px solid var(--line); color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .lb-score { font-family: var(--mono); font-weight: 500; min-width: 40px; text-align: right; font-size: 13px; }
  .lb-score .n { display: block; font-size: 9px; color: var(--faint); font-weight: 400; }

  .season-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
  .season-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: border-color 0.15s ease; }
  .season-card:hover { border-color: var(--accent); }
  .sc-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .sc-label { font-family: var(--serif); font-size: 21px; }
  .sc-live { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--yes); border: 1px solid var(--yes); border-radius: 999px; padding: 2px 8px; }
  .sc-arch { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); border: 1px solid var(--line-strong); border-radius: 999px; padding: 2px 8px; }
  .sc-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .sc-meta { margin-top: 12px; }
  .sc-line { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; padding: 3px 0; }
  .sc-key { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }
  .sc-val { font-size: 13px; font-weight: 600; text-align: right; }
  .sc-tally { font-family: var(--mono); font-size: 10px; color: var(--faint); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--line); }

  .notice { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px; text-align: center; color: var(--muted); font-size: 14px; }

  .layout { display: flex; gap: 28px; align-items: flex-start; margin-top: 18px; }
  .rail { flex: 0 0 300px; order: 1; position: sticky; top: 18px; }
  .main { flex: 1 1 auto; min-width: 0; order: 2; }
  .rail-h { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 22px 0 10px; font-weight: 500; }
  .rail-h:first-child { margin-top: 0; }
  .main h2.section:first-child { margin-top: 0; }

  .profile { padding: 16px 18px; }
  .prof-h { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-bottom: 14px; }
  .prof-group + .prof-group { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .pg-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .pg-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .pg-stats > div { min-width: 0; }
  .pg-v { font-family: var(--mono); font-size: 20px; font-weight: 500; line-height: 1.1; }
  .pg-l { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .prof-archive { margin-top: 16px; width: 100%; }

  .lb-empty { font-size: 13px; color: var(--faint); text-align: center; padding: 10px 0; }
  .lb-row.mine { background: var(--accent-tint); border-radius: 8px; margin: 0 -8px; padding-left: 10px; padding-right: 10px; border-bottom: none; }
  .lb-row.mine .lb-name, .lb-row.mine .lb-rank, .lb-row.mine .lb-score { color: var(--accent); }
  .lb-gap { text-align: center; color: var(--faint); font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em; padding: 2px 0; }
  .lb-full-btn { width: 100%; margin-top: 10px; }
  .lb-modal { display: flex; flex-direction: column; }
  .lb-modal .lb-row:last-child { border-bottom: none; }

  .prize { padding: 4px 16px; }
  .prize-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .prize-row:last-child { border-bottom: none; }
  .prize-place { font-family: var(--serif); font-size: 22px; line-height: 1; color: var(--accent); min-width: 26px; text-align: center; flex-shrink: 0; padding-top: 1px; }
  .prize-title { font-weight: 600; font-size: 14px; }
  .prize-detail { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .oracle-note { font-size: 12px; color: var(--muted); background: var(--accent-tint); border: 1px solid transparent; border-radius: 8px; padding: 9px 13px; margin-top: 16px; }
  .oracle-note b { color: var(--accent); }
  footer { margin-top: 48px; text-align: center; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); line-height: 2; }

  @media (max-width: 760px) {
    .layout { flex-direction: column; gap: 8px; }
    .rail { order: 2; position: static; flex-basis: auto; width: 100%; }
    .main { order: 1; width: 100%; }
    .main h2.section:first-child { margin-top: 8px; }
  }

  @media (max-width: 560px) {
    body { padding: 22px 13px 48px; }
    .masthead { align-items: flex-start; }
    .tagline { font-size: 15px; }
    .est { text-align: left; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .card { padding: 15px 16px; }
    .card .top { gap: 10px; }
    .q { font-size: 19px; }
    .chip { font-size: 9px; padding: 3px 8px; }
    .symline { font-size: 9px; }
    .forecast-row { flex-wrap: wrap; gap: 8px 12px; margin-top: 16px; align-items: center; }
    .forecast-row label { flex-basis: 100%; padding-top: 0; }
    .prob { font-size: 22px; }
    .actions .lock { width: 100%; }
    .btn-ghost { padding: 9px 14px; }
    .lb-row { gap: 9px; padding: 10px 2px; }
    .lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .badge { font-size: 9px; padding: 3px 7px; }
    .season-grid { grid-template-columns: 1fr; }
    h2.section { margin: 26px 0 10px; }
    table.results td, table.results th { padding: 6px 6px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="masthead">
    <div>
      <div class="brand">MateoMarkets</div>
      <div class="tagline">The world&rsquo;s leading Mateo outcomes exchange</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <div class="est">est. 2026<br>invite only</div>
      <button class="help-btn" onclick="openHelp()">? how it works</button>
    </div>
  </header>
  <div id="chrome"></div>
  <div id="app"><div class="notice" style="margin-top:20px">Opening the exchange&hellip; (first load can take a few seconds)</div></div>
  <div id="modal-root"></div>
  <footer>all forecasts final &middot; lower brier is better<br>past performance of mateo is not indicative of future mateo</footer>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwy_2Yv6fgQTlAGdM9UBa3gv9OPOyrOA7P2o7PDtLqHcn3BdSeOCbhrDzI8__s34Fpc/exec";

let DATA = null;
let ME = null;
let viewSeasonId = null;   // which season's board is shown
let showArchive = false;   // archive panel open instead of a board

const $app = document.getElementById("app");
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => { const d = new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };

const STOPWORDS = new Set(["will","mateo","get","an","a","in","go","on","the","than","this","more","less","before","did","his","by","to","of","do","does","is","at","it","ever","have","be","had","been","with","under","over","or","no","not","for","and","he","him"]);
function symbol(m) {
  const explicit = (m.ticker||"").trim();
  if (explicit) return "MTO\u00b7" + explicit.toUpperCase().replace(/\s+/g,"");
  const word = m.question.replace(/[?]/g,"").split(/\s+/).find(w => !STOPWORDS.has(w.toLowerCase()));
  return "MTO\u00b7" + (word ? word.replace(/[^A-Za-z0-9&]/g,"").slice(0,6).toUpperCase() : (m.id||"").toUpperCase());
}

// ---------- seasons ----------
function currentSeason() { return (DATA.seasons||[]).find(s => s.status === "current") || null; }
function seasonById(id) { return (DATA.seasons||[]).find(s => s.season_id === id) || null; }
function isVoid(m) { const v = (m.void||"").trim().toLowerCase(); return v === "yes" || v === "true" || v === "1"; }
function seasonMarkets(id) { return DATA.markets.filter(m => (m.season||"") === id && !isVoid(m)); }
function boardMarkets() {
  if (!viewSeasonId) return DATA.markets.filter(m => !isVoid(m)); // legacy mode: still hide voids
  return seasonMarkets(viewSeasonId);
}
function isArchivedView() { const cs = currentSeason(); return !!viewSeasonId && (!cs || viewSeasonId !== cs.season_id); }

// ---------- scoring ----------
function effectiveStatus(m) {
  if (m.status === "resolved") return "resolved";
  if (m.status === "closed") return "closed";
  const cd = fmtDate(m.close_date);
  if (cd && todayStr() > cd) return "closed";
  return "open";
}
function forecastsFor(marketId) {
  const seen = {};
  for (const f of DATA.forecasts) {
    if (f.market_id === marketId && !(f.name in seen)) seen[f.name] = Number(f.probability);
  }
  return seen;
}
function crowdAvg(marketId) { const v = Object.values(forecastsFor(marketId)); return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null; }
function brier(p, outcome) { return Math.pow(p/100 - (outcome === "YES" ? 1 : 0), 2); }
function personStats(slug, markets) {
  let sum = 0, n = 0;
  for (const m of markets) {
    if (m.status !== "resolved" || !m.outcome) continue;
    const fs = forecastsFor(m.id);
    if (slug in fs) { sum += brier(fs[slug], m.outcome); n++; }
  }
  return { avg: n ? sum/n : null, n };
}
function leaderboard(markets) {
  // Only people who actually participated this season (placed at least one forecast on its markets)
  const ids = new Set(markets.map(m => m.id));
  const played = new Set();
  for (const f of DATA.forecasts) if (ids.has(f.market_id)) played.add(f.name);
  const roster = DATA.people.filter(p => played.has(p.slug));

  const rows = roster.map(p => ({ ...p, ...personStats(p.slug, markets) }));
  rows.sort((a,b) => (a.avg === null) - (b.avg === null) || a.avg - b.avg);
  const badges = {};
  if (rows.length && rows[0].avg !== null) badges[rows[0].slug] = "best calibrated";
  let conv = null, contra = null;
  for (const p of roster) {
    let cSum = 0, cN = 0, dSum = 0, dN = 0;
    for (const m of markets) {
      const fs = forecastsFor(m.id);
      if (!(p.slug in fs)) continue;
      cSum += Math.abs(fs[p.slug] - 50); cN++;
      const others = Object.entries(fs).filter(([k]) => k !== p.slug).map(([,v]) => v);
      if (others.length) { dSum += Math.abs(fs[p.slug] - others.reduce((a,b)=>a+b,0)/others.length); dN++; }
    }
    if (cN && (!conv || cSum/cN > conv.v)) conv = { slug: p.slug, v: cSum/cN };
    if (dN && (!contra || dSum/dN > contra.v)) contra = { slug: p.slug, v: dSum/dN };
  }
  if (contra && !badges[contra.slug]) badges[contra.slug] = "most contrarian";
  if (conv && !badges[conv.slug]) badges[conv.slug] = "maximum conviction";
  return { rows, badges };
}
function initials(name) { return name.trim().split(/\s+/).map(w => w[0]).join("").slice(0,2).toUpperCase(); }
function displayName(slug) { const p = DATA.people.find(x => x.slug === slug); return p ? p.display_name : slug; }
function invitedCount() { return DATA.people.filter(p => (p.role||"") !== "oracle").length; }
function marketById(id) { return DATA.markets.find(m => m.id === id); }
function fmtDate(s) {
  s = String(s || "").trim();
  if (!s) return "";
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);   // already YYYY-MM-DD
  if (m) return m[1] + "-" + m[2] + "-" + m[3];
  const d = new Date(s);                            // a full date string from the sheet
  if (!isNaN(d)) return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return s;
}
function allLiveMarkets() { return DATA.markets.filter(m => !isVoid(m)); }
function seasonsPlayedBy(slug) {
  const ids = new Set();
  for (const f of DATA.forecasts) {
    if (f.name !== slug) continue;
    const m = marketById(f.market_id);
    if (m && !isVoid(m) && (m.season||"")) ids.add(m.season);
  }
  return ids.size;
}

function lbRow(r, rank, badges) {

// ---------- ticker / chrome ----------
function tickerInner(markets) {
  if (!markets || !markets.length) return `<span class="sym">MTO</span> season opening soon &middot; no live quotes <span class="sep">&#9670;</span>`;
  const archived = isArchivedView();
  const items = markets.map(m => {
    const sym = `<span class="sym">${esc(symbol(m))}</span>`;
    if (m.status === "resolved" && m.outcome) return `${sym} settled <span class="${m.outcome==="YES"?"up":"down"}">${esc(m.outcome)}</span>`;
    const avg = crowdAvg(m.id);
    if (avg === null) return `${sym} <span class="pending">${archived ? "no quotes" : "lock to reveal"}</span>`;
    // Live season: hide consensus until the viewer locks. Archived season: nothing to protect, show it.
    const iLocked = ME && (ME in forecastsFor(m.id));
    if (!archived && !iLocked) return `${sym} <span class="pending">lock to reveal</span>`;
    return `${sym} <span class="${avg>=50?"up":"down"}">${avg}% yes</span>${effectiveStatus(m)==="closed"?" &middot; closed":""}`;
  });
  return items.join('<span class="sep">&#9670;</span>') + '<span class="sep">&#9670;</span>';
}
function renderChrome() {
  const chrome = document.getElementById("chrome");
  if (!ME) { chrome.innerHTML = ""; return; }
  if (showArchive) {
    chrome.innerHTML = `<div class="archive-banner"><div><span class="ab-tag">archive</span> browse past seasons</div>
      <button class="btn-ghost" onclick="backToLive()">&larr; back to current</button></div>`;
    return;
  }
  if (isArchivedView()) {
    const s = seasonById(viewSeasonId);
    chrome.innerHTML = `<div class="archive-banner"><div><span class="ab-tag">archived</span> <b>${esc(s?s.label:"Season")}</b>${s&&s.subtitle?` &middot; ${esc(s.subtitle)}`:""}</div>
      <button class="btn-ghost" onclick="backToLive()">&larr; back to current season</button></div>`;
    return;
  }
  const strip = tickerInner(boardMarkets());
  chrome.innerHTML = `<div class="ticker" aria-hidden="true"><div class="ticker-inner">${strip}${strip}</div></div>`;
}

function openHelp() {

      <div class="modal" role="dialog" aria-label="How it works">
        <h3>How MateoMarkets works</h3>
        <div class="m-sub">A prediction market for the outcomes of one (1) Mateo.</div>

        <h4>The idea</h4>
        <p>Each market is a yes-or-no question about Mateo's life. Your goal is to predict how likely it is to happen, expressed as a percentage from 1 to 99.</p>

        <h4>Reading the slider</h4>
        <p>The number is always your chance of <b>YES</b>. So <b>80% YES</b> means you think it's very likely to happen; <b>15% YES</b> means you think it probably won't. Drag right for more likely, left for less likely. There's no separate "NO" number, just a low YES.</p>

        <h4>Locking</h4>
        <p>You get one forecast per market, and it's final once you lock it. Forecasting closes a few days after a market opens. After you lock, you'll see what the market thinks.</p>

        <h4>Scoring: the Brier score</h4>
        <p>You're scored on accuracy and confidence. <b>Lower is better.</b> Very high or very low percentages reflect high confidence, which is rewarded more when you're right and punished more when you're wrong.</p>
        <div class="ex"><b>Say 90% YES and it happens:</b> excellent, small Brier.</div>
        <div class="ex"><b>Say 90% YES and it doesn't:</b> yikes, big Brier.</div>
        <div class="ex"><b>Say 50%:</b> middling no matter what.</div>
        <p>Your season score is the average across all markets, so it rewards being well calibrated across many questions.</p>
        <p>To qualify for prizes you must forecast <b>every</b> market this season, which keeps everyone's score based on a large enough sample of predictions.</p>

        <div class="bonus">
          <h4>Technical details</h4>
          <p>The Brier score is the squared error between your probability and the outcome (YES = 1, NO = 0):</p>
          <div class="formula">score = (p &minus; outcome)&sup2;</div>
          <p>where p is your forecast as a decimal. A 90% YES on a YES scores (0.9 &minus; 1)&sup2; = 0.01; on a NO it scores (0.9 &minus; 0)&sup2; = 0.81. Your leaderboard number is the mean of these across your resolved markets. 0 is perfect, 0.25 is what you get always guessing 50%.</p>

// ---------- views ----------
function render() {
  const archived = !showArchive && isArchivedView();
  document.body.classList.toggle("archived", archived);
  renderChrome();
  if (!ME) { renderPicker(); return; }
  if (showArchive) { renderArchivePanel(); return; }

  const me = DATA.people.find(p => p.slug === ME);
  const board = boardMarkets();
  const open = board.filter(m => effectiveStatus(m) === "open");
  const closed = board.filter(m => effectiveStatus(m) === "closed");
  const resolved = board.filter(m => effectiveStatus(m) === "resolved");
  const lb = leaderboard(board);

  // ----- main column: markets -----
  let main = "";
  if (!archived && me.role === "oracle") {
    main += `<div class="oracle-note">You are <b>the Oracle</b>. Create, close, and resolve markets directly in the Google Sheet; the site updates on next load.</div>`;
  }
  if (archived) {
    const unresolved = [...open, ...closed];
    if (unresolved.length) main += section("Unresolved at archive") + unresolved.map(m => positionCard(m, "unresolved")).join("");
    if (resolved.length) main += section("Resolved") + resolved.map(resolvedCard).join("");
    if (!board.length) main += `<div class="notice">This season has no recorded markets.</div>`;
  } else {
    main += section("Open markets");
    main += open.length ? open.map(marketCard).join("") : `<div class="notice">No open markets. The Oracle is deliberating.</div>`;
    if (closed.length) main += section("Closed &middot; awaiting resolution") + closed.map(m => positionCard(m, "closed")).join("");
    if (resolved.length) main += section("Resolved") + resolved.map(resolvedCard).join("");
  }

  // ----- rail: profile + leaderboard -----
  const rail = profileCard(me, open, lb, archived) + leaderboardCard(lb, archived) + prizesCard();

  const who = `<div class="whoami">forecasting as <b>${esc(me.display_name)}</b> <span class="linkish" onclick="switchUser()">not you?</span></div>`;
  $app.innerHTML = who + `<div class="layout"><aside class="rail">${rail}</aside><main class="main">${main}</main></div>`;
}

function profileCard(me, open, lb, archived) {
  const mine = lb.rows.find(r => r.slug === ME);
  const myRank = mine && mine.avg !== null ? lb.rows.indexOf(mine) + 1 : null;
  const players = lb.rows.length;
  const played = lb.rows.some(r => r.slug === ME);

  // this season / this archive
  const sLabel = archived ? esc((seasonById(viewSeasonId)||{}).label || "this season") : "this season";
  const brier = mine && mine.avg !== null ? mine.avg.toFixed(2) : "&mdash;";
  let rankVal;
  if (myRank) rankVal = "#" + myRank;
  else if (played) rankVal = "awaiting";
  else rankVal = archived ? "&mdash;" : "&mdash;";
  const rankLabel = archived ? "placement" : "rank";

  let thirdStat;
  if (archived) {
    thirdStat = `<div><div class="pg-v">${players}</div><div class="pg-l">players</div></div>`;
  } else {
    const lockedOpen = open.filter(m => ME in forecastsFor(m.id)).length;
    thirdStat = `<div><div class="pg-v">${lockedOpen}/${open.length}</div><div class="pg-l">locked</div></div>`;
  }

  // lifetime
  const life = personStats(ME, allLiveMarkets());
  const lifeBrier = life.avg !== null ? life.avg.toFixed(2) : "&mdash;";
  const seasons = seasonsPlayedBy(ME);

  return `<div class="card profile">
    <div class="prof-h">your performance</div>
    <div class="prof-group">
      <div class="pg-label">${sLabel}</div>
      <div class="pg-stats">
        <div><div class="pg-v">${brier}</div><div class="pg-l">avg brier</div></div>
        <div><div class="pg-v">${rankVal}${myRank?`<span style="font-size:12px;color:var(--faint)"> of ${players}</span>`:""}</div><div class="pg-l">${rankLabel}</div></div>
        ${thirdStat}
      </div>
    </div>
    <div class="prof-group">
      <div class="pg-label">lifetime</div>
      <div class="pg-stats">
        <div><div class="pg-v">${lifeBrier}</div><div class="pg-l">avg brier</div></div>
        <div><div class="pg-v">${seasons}</div><div class="pg-l">seasons</div></div>
        <div><div class="pg-v">${life.n}</div><div class="pg-l">resolved</div></div>
      </div>
    </div>
    <button class="btn-ghost prof-archive" onclick="openArchive()">&#9636; past seasons</button>
  </div>`;
}

function leaderboardCard(lb, archived) {
  const title = archived ? "final standings" : "leaderboard";
  if (!lb.rows.length) return `<div class="rail-h">${title}</div><div class="card"><div class="lb-empty">no forecasts yet</div></div>`;

  const top = lb.rows.slice(0, 3);
  let rowsHtml = top.map((r, i) => lbRow(r, i + 1, lb.badges)).join("");

  // If the viewer isn't in the top 3, append their own row below a divider.
  const myIndex = lb.rows.findIndex(r => r.slug === ME);
  if (myIndex >= 3) {
    rowsHtml += `<div class="lb-gap">&middot;&middot;&middot;</div>` + lbRow(lb.rows[myIndex], myIndex + 1, lb.badges);
  }

  const moreBtn = lb.rows.length > 3
    ? `<button class="btn-ghost lb-full-btn" onclick="openLeaderboard()">full leaderboard</button>`
    : "";

  return `<div class="rail-h">${title}</div><div class="card" style="padding:6px 16px">${rowsHtml}</div>${moreBtn}`;
}

}

function renderArchivePanel() {
  const seasons = (DATA.seasons||[]).slice().sort((a,b) => {
    if (a.status==="current" && b.status!=="current") return -1;
    if (b.status==="current" && a.status!=="current") return 1;
    return (a.season_id < b.season_id) ? 1 : -1;
  });
  if (!seasons.length) { $app.innerHTML = `<div class="notice">No seasons defined yet.</div>`; return; }
  const cards = seasons.map(s => {
    const mk = seasonMarkets(s.season_id);

    const lb = leaderboard(mk);
    const winner = lb.rows[0] && lb.rows[0].avg!==null ? lb.rows[0].display_name : null;
    const live = s.status === "current";
    const mineRow = lb.rows.find(r => r.slug === ME);
    const myPlace = (mineRow && mineRow.avg!==null) ? "#"+(lb.rows.indexOf(mineRow)+1)+" of "+lb.rows.length
      : (lb.rows.some(r => r.slug === ME) ? "awaiting" : "did not play");

      <div class="sc-sub">${esc(s.subtitle||"")}</div>
      <div class="sc-meta">

        <div class="sc-line"><span class="sc-key">Your placement</span><span class="sc-val">${myPlace}</span></div>
        <div class="sc-tally">${mk.length} market${mk.length===1?"":"s"} &middot; ${resolved} resolved</div>
      </div>
    </div>`;
  }).join("");
  $app.innerHTML = `<div class="whoami">browsing the archive <span class="linkish" onclick="backToLive()">back to current</span></div>`
    + section("Seasons") + `<div class="season-grid">${cards}</div>`;

function consensusHtml(marketId, showLocked, myPick) {
  const fs = forecastsFor(marketId);
  const vals = Object.values(fs);
  if (!vals.length) return `<div class="bar-caption"><span>no forecasts</span></div>`;
  const avg = Math.round(vals.reduce((a,b)=>a+b,0) / vals.length);
  const hasPick = (myPick !== undefined && myPick !== null);
  const tick = hasPick ? `<div class="you-tick" style="left:${myPick}%"></div>` : "";
  let mid;
  if (hasPick) mid = `<span class="you-mid"><span class="you-dot"></span>you ${myPick}%</span>`;
  else if (showLocked) mid = `<span>${vals.length} of ${invitedCount()} locked</span>`;
  else mid = `<span></span>`;
  const caption = `<span class="y">yes ${avg}</span>${mid}<span class="n">no ${100-avg}</span>`;
  return `<div class="bar">${tick}<div class="fill" style="width:${avg}%"></div></div><div class="bar-caption">${caption}</div>`;
}

function switchUser() { localStorage.removeItem("mm_name"); ME = null; render(); }

async function lockForecast(marketId) {
  const slider = document.getElementById("s-" + marketId);
  const btn = document.getElementById("b-" + marketId);
  const errEl = document.getElementById("e-" + marketId);
  const p = parseInt(slider.value, 10);
  if (!confirm(`Lock ${p}% YES on this market? Forecasts are final.`)) return;
  btn.disabled = true; slider.disabled = true; btn.textContent = "Locking\u2026"; errEl.textContent = "";
  try {
    const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ name: ME, market_id: marketId, probability: p }) });
    const out = await res.json();
    if (out.ok) {
      DATA.forecasts.push({ timestamp: "now", name: ME, market_id: marketId, probability: String(p) });
      render();
    } else {
      errEl.textContent = out.error || "Something went wrong.";
      btn.disabled = false; slider.disabled = false; btn.textContent = "Lock forecast";
    }
  } catch (err) {
    errEl.textContent = "Couldn't reach the exchange. Try again in a moment.";
    btn.disabled = false; slider.disabled = false; btn.textContent = "Lock forecast";
  }
}

async function init() {
  try { const res = await fetch(API_URL); DATA = await res.json(); }
  catch (err) { $app.innerHTML = `<div class="notice" style="margin-top:20px">Couldn't reach the data service. It may be waking up; refresh in a few seconds.</div>`; return; }
  const cs = currentSeason();
  viewSeasonId = cs ? cs.season_id : null;
  const urlName = new URLSearchParams(location.search).get("name");
  const stored = localStorage.getItem("mm_name");
  const valid = s => s && DATA.people.some(p => p.slug === s);
  if (valid(urlName)) { ME = urlName; localStorage.setItem("mm_name", urlName); }
  else if (valid(stored)) { ME = stored; }
  render();
}

document.addEventListener("keydown", function(e){ if (e.key === "Escape") { closeHelp(); closeLeaderboard(); } });
init();
</script>
</body>
</html>
